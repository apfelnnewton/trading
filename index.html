<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Trading Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: #0a0a0f;
    color: #e8e8ee;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .container { max-width: 430px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header-card {
    background: linear-gradient(135deg, #0f1420 0%, #14182a 100%);
    border: 1px solid #22263a;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .tag-top {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(52, 211, 153, 0.12);
    color: #34d399;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .tag-top::before { content: ""; width: 6px; height: 6px; background: #34d399; border-radius: 50%; }
  .title { font-size: 26px; font-weight: 700; color: #fff; }
  .title-accent { color: #a78bfa; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: #14182a;
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
    overflow-x: auto;
  }
  .tab {
    flex: 1;
    min-width: fit-content;
    padding: 10px 8px;
    font-size: 13px;
    color: #8890aa;
    background: transparent;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .tab.active { background: rgba(167, 139, 250, 0.12); color: #a78bfa; box-shadow: 0 0 0 1px rgba(167, 139, 250, 0.3); }
  .tab-ico { font-size: 14px; }

  /* Sections */
  .section {
    background: #11131f;
    border: 1px solid #1f2238;
    border-radius: 16px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    padding: 16px;
    cursor: pointer;
    user-select: none;
  }
  .section-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .section-title-wrap { flex: 1; }
  .section-time { font-size: 12px; color: #a78bfa; font-weight: 600; margin-bottom: 2px; }
  .section-title { font-size: 17px; font-weight: 700; color: #fff; }
  .section-count {
    background: rgba(167, 139, 250, 0.15);
    color: #a78bfa;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    margin-right: 8px;
  }
  .chevron { color: #555; transition: transform 0.25s; font-size: 12px; }
  .section.open .chevron { transform: rotate(180deg); }
  .section-body { display: none; padding: 0 12px 12px; }
  .section.open .section-body { display: block; }

  /* Item */
  .item {
    background: #181b2e;
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .item:hover { background: #1c2035; }
  .item.checked { opacity: 0.55; }
  .item.checked .item-title { text-decoration: line-through; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 999px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .b-필수 { background: rgba(244, 63, 94, 0.15); color: #fb7185; }
  .b-선택 { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
  .b-이벤트 { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
  .b-좋음 { background: rgba(52, 211, 153, 0.15); color: #34d399; }
  .b-이상 { background: rgba(244, 114, 182, 0.15); color: #f472b6; }
  .b-매수 { background: rgba(251, 146, 60, 0.15); color: #fb923c; }
  .b-매매 { background: rgba(251, 146, 60, 0.15); color: #fb923c; }
  .b-골든 { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
  .b-자동 { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
  .b-3분 { background: rgba(52, 211, 153, 0.15); color: #34d399; }
  .b-1분 { background: rgba(52, 211, 153, 0.15); color: #34d399; }
  .b-전환 { background: rgba(52, 211, 153, 0.15); color: #34d399; }
  .b-진입 { background: rgba(52, 211, 153, 0.15); color: #34d399; }
  .b-num { background: rgba(167, 139, 250, 0.15); color: #a78bfa; font-family: ui-monospace, monospace; }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 3px; }
  .item-desc { font-size: 12.5px; color: #8890aa; line-height: 1.5; }

  /* Bullet list (단타 원칙 / 주식 지식) */
  .bullet-item {
    background: #181b2e;
    border-radius: 10px;
    padding: 11px 14px;
    margin-top: 6px;
    font-size: 13.5px;
    color: #dcdce6;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    cursor: pointer;
  }
  .bullet-item::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }
  .bullet-item.checked { opacity: 0.5; }
  .bullet-item.checked .bullet-text { text-decoration: line-through; }
  .dot-green::before { background: #34d399; }
  .dot-red::before { background: #fb7185; }
  .dot-yellow::before { background: #fbbf24; }
  .dot-purple::before { background: #a78bfa; }
  .dot-orange::before { background: #fb923c; }
  .bullet-text { flex: 1; line-height: 1.5; }

  /* Core principle */
  .core {
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.08), rgba(167, 139, 250, 0.08));
    border: 1px solid rgba(167, 139, 250, 0.25);
    border-radius: 14px;
    padding: 16px;
    margin-top: 16px;
    text-align: center;
  }
  .core-title { font-weight: 700; color: #fbbf24; font-size: 14px; margin-bottom: 10px; }
  .core-line { font-size: 12.5px; color: #b8bccc; line-height: 1.8; }

  .page { display: none; }
  .page.active { display: block; }

  .progress {
    background: #181b2e;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar { flex: 1; height: 8px; background: #22263a; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #34d399); width: 0%; transition: width 0.3s; }
  .progress-text { font-size: 12px; color: #a78bfa; font-weight: 600; white-space: nowrap; }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background: #181b2e;
    border: 1px solid #22263a;
    color: #8890aa;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
  }
  .reset-btn:hover { color: #fb7185; border-color: rgba(244, 63, 94, 0.3); }

  /* ===== 오늘의 추천 ===== */
  .pick-header {
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.12), rgba(167, 139, 250, 0.12));
    border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 16px;
    text-align: center;
  }
  .pick-header-date { font-size: 12px; color: #fbbf24; font-weight: 600; margin-bottom: 4px; }
  .pick-header-updated { font-size: 11px; color: #8890aa; }

  .best-pick {
    background: linear-gradient(135deg, #1a1530 0%, #1f1a3d 100%);
    border: 2px solid #fbbf24;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 18px;
    position: relative;
    box-shadow: 0 0 30px rgba(251, 191, 36, 0.15);
  }
  .best-crown {
    display: inline-block;
    background: linear-gradient(135deg, #fbbf24, #fb923c);
    color: #0a0a0f; font-weight: 800; font-size: 14px;
    padding: 8px 18px; border-radius: 999px;
    box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
    margin-bottom: 12px;
    text-align: center;
  }
  .pick-card {
    background: #11131f;
    border: 1px solid #1f2238;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .pick-rank {
    position: absolute; top: -10px; left: 14px;
    background: #22263a;
    color: #a78bfa;
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid rgba(167, 139, 250, 0.4);
  }
  .pick-card-wrap { position: relative; margin-top: 12px; }

  .pick-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .pick-name { font-size: 20px; font-weight: 800; color: #fff; }
  .pick-code { font-size: 11px; color: #8890aa; font-family: ui-monospace, monospace; margin-top: 2px; }
  .pick-price { text-align: right; }
  .pick-price-num { font-size: 22px; font-weight: 800; color: #fff; }
  .pick-price-chg { font-size: 12px; font-weight: 600; }
  .chg-up { color: #fb7185; }
  .chg-down { color: #60a5fa; }
  .pick-stars { color: #fbbf24; font-size: 18px; letter-spacing: 2px; margin-top: 4px; }
  .pick-stars .off { color: #3a3d5a; }

  .pick-row {
    background: #181b2e;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .pick-row-label {
    font-size: 11px; color: #8890aa; font-weight: 600;
    margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
  }
  .pick-row-value { font-size: 13.5px; color: #e8e8ee; line-height: 1.55; }
  .pick-row-strong { color: #fff; font-weight: 700; }
  .pick-row-purple { color: #a78bfa; font-weight: 700; }
  .pick-row-green { color: #34d399; font-weight: 700; }
  .pick-row-red { color: #fb7185; font-weight: 700; }
  .pick-row-yellow { color: #fbbf24; font-weight: 700; }

  .signal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 4px; }
  .signal-chip {
    background: rgba(52, 211, 153, 0.1);
    border: 1px solid rgba(52, 211, 153, 0.3);
    color: #34d399;
    padding: 6px 4px; border-radius: 8px;
    font-size: 11px; font-weight: 600; text-align: center;
  }
  .signal-chip.off { background: rgba(136, 144, 170, 0.08); border-color: rgba(136, 144, 170, 0.2); color: #8890aa; }

  .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .price-box { background: #181b2e; border-radius: 10px; padding: 10px; text-align: center; }
  .price-box-label { font-size: 10px; color: #8890aa; margin-bottom: 4px; }
  .price-box-val { font-size: 13px; font-weight: 700; }
  .pb-buy { border: 1px solid rgba(52, 211, 153, 0.3); }
  .pb-buy .price-box-val { color: #34d399; }
  .pb-target { border: 1px solid rgba(251, 191, 36, 0.3); }
  .pb-target .price-box-val { color: #fbbf24; }
  .pb-stop { border: 1px solid rgba(244, 63, 94, 0.3); }
  .pb-stop .price-box-val { color: #fb7185; }
  .price-box-pct { font-size: 10px; color: #8890aa; margin-top: 2px; }

  .news-item {
    font-size: 12.5px; color: #dcdce6; line-height: 1.5;
    padding: 6px 0;
    border-bottom: 1px solid #22263a;
  }
  .news-item:last-child { border-bottom: none; }
  .news-item::before { content: "📰 "; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .mini-tag {
    background: rgba(167, 139, 250, 0.12);
    color: #a78bfa;
    font-size: 11px; font-weight: 600;
    padding: 4px 9px; border-radius: 999px;
  }
  .mini-tag.risk { background: rgba(244, 63, 94, 0.12); color: #fb7185; }
  .mini-tag.time { background: rgba(96, 165, 250, 0.12); color: #60a5fa; }

  .update-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(167, 139, 250, 0.15), rgba(52, 211, 153, 0.15));
    border: 1px solid rgba(167, 139, 250, 0.3);
    color: #a78bfa;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .update-btn:hover { background: linear-gradient(135deg, rgba(167, 139, 250, 0.22), rgba(52, 211, 153, 0.22)); }

  /* ===== 찬반 토론 ===== */
  .debate { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
  .debate-col { background: #181b2e; border-radius: 10px; padding: 10px 12px; }
  .debate-col.bull { border-left: 3px solid #34d399; }
  .debate-col.bear { border-left: 3px solid #fb7185; }
  .debate-label { font-size: 11px; font-weight: 700; margin-bottom: 6px; }
  .debate-label.bull-label { color: #34d399; }
  .debate-label.bear-label { color: #fb7185; }
  .debate-point { font-size: 11.5px; color: #ccc; line-height: 1.5; padding: 3px 0; }
  .debate-point::before { content: "• "; }

  /* ===== 시나리오 ===== */
  .scenario-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 6px; }
  .scenario-box { border-radius: 10px; padding: 12px 8px; text-align: center; }
  .scenario-box.bull-sc { background: rgba(52, 211, 153, 0.08); border: 1px solid rgba(52, 211, 153, 0.3); }
  .scenario-box.base-sc { background: rgba(167, 139, 250, 0.08); border: 1px solid rgba(167, 139, 250, 0.3); }
  .scenario-box.bear-sc { background: rgba(244, 63, 94, 0.08); border: 1px solid rgba(244, 63, 94, 0.3); }
  .scenario-label { font-size: 10px; font-weight: 700; margin-bottom: 4px; }
  .scenario-box.bull-sc .scenario-label { color: #34d399; }
  .scenario-box.base-sc .scenario-label { color: #a78bfa; }
  .scenario-box.bear-sc .scenario-label { color: #fb7185; }
  .scenario-price { font-size: 15px; font-weight: 800; color: #fff; }
  .scenario-pct { font-size: 11px; margin-top: 2px; }
  .scenario-box.bull-sc .scenario-pct { color: #34d399; }
  .scenario-box.base-sc .scenario-pct { color: #a78bfa; }
  .scenario-box.bear-sc .scenario-pct { color: #fb7185; }
  .scenario-desc { font-size: 10px; color: #8890aa; margin-top: 4px; line-height: 1.4; }

  /* ===== 포트폴리오 비중 ===== */
  .portfolio-section {
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.06), rgba(167, 139, 250, 0.06));
    border: 1px solid rgba(167, 139, 250, 0.25);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .portfolio-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 12px; text-align: center; }
  .portfolio-bars { display: flex; height: 32px; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
  .portfolio-bar { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; }
  .portfolio-bar:nth-child(1) { background: linear-gradient(135deg, #fbbf24, #fb923c); }
  .portfolio-bar:nth-child(2) { background: linear-gradient(135deg, #a78bfa, #818cf8); }
  .portfolio-bar:nth-child(3) { background: linear-gradient(135deg, #34d399, #22d3ee); }
  .portfolio-legend { display: flex; justify-content: space-around; gap: 8px; }
  .portfolio-item { text-align: center; flex: 1; }
  .portfolio-item-name { font-size: 13px; font-weight: 700; color: #fff; }
  .portfolio-item-pct { font-size: 18px; font-weight: 800; color: #fbbf24; margin: 2px 0; }
  .portfolio-item-sector { font-size: 10px; color: #8890aa; }
  .portfolio-rule { font-size: 11px; color: #8890aa; text-align: center; margin-top: 10px; line-height: 1.6; }

  /* ===== 실시간 새로고침 ===== */
  .realtime-section {
    background: #11131f;
    border: 1px solid rgba(96, 165, 250, 0.3);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .realtime-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .realtime-title { font-size: 16px; font-weight: 700; color: #60a5fa; }
  .realtime-time { font-size: 11px; color: #8890aa; }
  .realtime-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, rgba(96, 165, 250, 0.15), rgba(52, 211, 153, 0.15));
    border: 1px solid rgba(96, 165, 250, 0.3);
    color: #60a5fa;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .realtime-btn:hover { background: linear-gradient(135deg, rgba(96, 165, 250, 0.25), rgba(52, 211, 153, 0.25)); }
  .realtime-empty { text-align: center; padding: 20px; color: #555; font-size: 13px; line-height: 1.8; }

  /* ===== 장중 신규 발굴 종목 (누적) ===== */
  .intraday-section {
    background: linear-gradient(135deg, rgba(251, 146, 60, 0.05), rgba(251, 191, 36, 0.05));
    border: 1px solid rgba(251, 146, 60, 0.3);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .intraday-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .intraday-title { font-size: 16px; font-weight: 800; color: #fb923c; display: flex; align-items: center; gap: 6px; }
  .intraday-count { font-size: 11px; color: #8890aa; background: rgba(251,146,60,0.12); padding: 3px 9px; border-radius: 999px; }
  .intraday-help { font-size: 11px; color: #8890aa; margin-bottom: 10px; line-height: 1.5; }
  .intraday-card {
    background: #14182a;
    border: 1px solid #22263a;
    border-left: 3px solid #fb923c;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .intraday-card.style-swing { border-left-color: #a78bfa; }
  .intraday-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .intraday-time { font-size: 11px; font-weight: 700; color: #fb923c; background: rgba(251,146,60,0.12); padding: 3px 8px; border-radius: 6px; font-family: ui-monospace, monospace; }
  .intraday-slot { font-size: 11px; color: #a78bfa; background: rgba(167,139,250,0.12); padding: 3px 8px; border-radius: 6px; }
  .intraday-style { font-size: 11px; color: #34d399; background: rgba(52,211,153,0.12); padding: 3px 8px; border-radius: 6px; }
  .intraday-style.swing { color: #a78bfa; background: rgba(167,139,250,0.12); }
  .intraday-name-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 6px; }
  .intraday-name { font-size: 17px; font-weight: 800; color: #fff; }
  .intraday-code { font-size: 11px; color: #8890aa; margin-left: 6px; }
  .intraday-price { font-size: 15px; font-weight: 700; color: #fff; text-align: right; }
  .intraday-reason { font-size: 12.5px; color: #fbbf24; background: rgba(251,191,36,0.08); border-radius: 8px; padding: 8px 10px; margin: 6px 0; line-height: 1.55; }
  .intraday-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }
  .intraday-kv { background: rgba(20,23,40,0.6); border-radius: 8px; padding: 7px 8px; text-align: center; }
  .intraday-kv-label { font-size: 10px; color: #8890aa; }
  .intraday-kv-val { font-size: 12px; font-weight: 700; margin-top: 2px; }
  .intraday-kv-buy { color: #fbbf24; }
  .intraday-kv-target { color: #34d399; }
  .intraday-kv-stop { color: #fb7185; }
  .intraday-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px; color: #8890aa; }
  .intraday-rr { color: #a78bfa; font-weight: 700; }
  .intraday-empty { text-align: center; padding: 20px; color: #555; font-size: 12.5px; line-height: 1.8; }

  /* 적중률 분석 */
  .track-section { background: linear-gradient(135deg, #0f1420, #14182a); border: 1px solid #22263a; border-radius: 16px; padding: 16px; margin-top: 20px; }
  .track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .track-title { font-size: 15px; font-weight: 700; color: #e8e8ee; }
  .track-date { font-size: 11px; color: #8890aa; }
  .track-summary { display: flex; gap: 10px; margin-bottom: 14px; }
  .track-stat { flex: 1; background: rgba(30,30,50,0.6); border-radius: 12px; padding: 12px 8px; text-align: center; }
  .track-stat-val { font-size: 22px; font-weight: 800; }

function renderStars(n) {
  let s = "";
  for (let i = 0; i < 5; i++) s += i < n ? "★" : '<span class="off">★</span>';
  return s;
}

function renderSignals(sig) {
  if (!sig) return `<div class="signal-grid"><div class="signal-chip off">신호 데이터 없음</div></div>`;
  const chips = [
    { on: !!sig.sar, label: "외인 " + (sig.sar ? "매수 ✓" : "매도 ✗"), note: sig.sarNote || "-" },
    { on: !!sig.vr, label: "기관 " + (sig.vr ? "매수 ✓" : "매도 ✗"), note: sig.vrValue || "-" },
    { on: !!sig.boll, label: "거래량 " + (sig.boll ? "급증 ✓" : "보통 ✗"), note: sig.bollNote || "-" },
  ];
  return `<div class="signal-grid">${chips.map(c =>
    `<div class="signal-chip ${c.on ? '' : 'off'}">${c.label}<div style="font-size:10px;opacity:0.8;margin-top:2px">${c.note}</div></div>`
  ).join("")}</div>`;
}

function renderPickCard(p, isBest) {
  try {
    if (!p) return `<div class="pick-card-wrap"><div class="pick-card"><div style="padding:20px;text-align:center;color:#8890aa">데이터 로딩 중...</div></div></div>`;
    const price = typeof p.price === 'number' ? p.price : 0;
    const change = typeof p.change === 'number' ? p.change : 0;
    const changePct = typeof p.changePct === 'number' ? p.changePct : 0;
    const stop = typeof p.stop === 'number' ? p.stop : null;
    const target = typeof p.target === 'number' ? p.target : null;
    const buyRange = typeof p.buyRange === 'string' ? p.buyRange : String(price);
    const chgClass = change >= 0 ? "chg-up" : "chg-down";
    const chgSign = change >= 0 ? "▲" : "▼";
    const wrapClass = isBest ? "best-pick" : "pick-card";
    const badge = isBest ? `` : `<div class="pick-rank">#${p.rank || ""}</div>`;
    const crownHTML = isBest ? `<div style="text-align:center"><div class="best-crown">👑 오늘의 베스트 픽</div></div>` : ``;

    // 매집 중심가 안전 계산
    let buyCenter = price;
    try {
      if (buyRange.includes('~')) {
        const parts = buyRange.split('~');
        const lo = parseInt((parts[0] || '').replace(/[^\d]/g,''));
        const hi = parseInt((parts[1] || '').replace(/[^\d]/g,''));
        if (!isNaN(lo) && !isNaN(hi)) buyCenter = Math.round((lo + hi) / 2);
      }
    } catch(e) { buyCenter = price; }

    // 손절/목표 알림 배너
    let alertBanner = "";
    try {
      if (stop && price > 0 && price <= stop) {
        alertBanner = `<div style="background:rgba(251,63,94,0.15);border:1px solid rgba(251,63,94,0.4);border-radius:10px;padding:10px 14px;margin:8px 0;text-align:center;animation:blink 1s infinite">
          🚨 <strong>손절선 도달!</strong> 현재가 ${price.toLocaleString()}원 ≤ 손절가 ${stop.toLocaleString()}원 — 즉시 매도 검토</div>`;
      } else if (stop && price > 0 && price <= stop * 1.02) {
        alertBanner = `<div style="background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);border-radius:10px;padding:10px 14px;margin:8px 0;text-align:center">
          ⚠️ <strong>손절선 근접!</strong> 현재가 ${price.toLocaleString()}원 → 손절가 ${stop.toLocaleString()}원까지 ${((price - stop) / price * 100).toFixed(1)}% 남음</div>`;
      } else if (target && price > 0 && price >= target) {
        alertBanner = `<div style="background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.3);border-radius:10px;padding:10px 14px;margin:8px 0;text-align:center">
          🎯 <strong>목표가 도달!</strong> 현재가 ${price.toLocaleString()}원 ≥ 목표가 ${target.toLocaleString()}원 — 익절 검토</div>`;
      }
    } catch(e) { alertBanner = ""; }

    // 뉴스 안전 렌더링
    const newsHTML = Array.isArray(p.news) ? p.news.map(n => `<div class="news-item">${n || ""}</div>`).join("") : `<div class="news-item">뉴스 데이터 없음</div>`;

    // 섹터 안전 렌더링
    const sectorHTML = Array.isArray(p.sector) ? p.sector.map(s => `<span class="mini-tag">#${s || ""}</span>`).join("") : `<span class="mini-tag">#-</span>`;

    // 리스크 안전 렌더링
    const risksHTML = Array.isArray(p.risks) ? p.risks.map(r => `<div class="pick-row-value" style="font-size:12.5px;margin-top:4px;color:#fb7185">• ${r || ""}</div>`).join("") : `<div class="pick-row-value" style="font-size:12.5px;margin-top:4px;color:#fb7185">• 리스크 정보 없음</div>`;

    // 찬반 토론 안전 렌더링
    let debateHTML = "";
    try {
      if (p.debate && typeof p.debate === 'object') {
        const bullArr = Array.isArray(p.debate.bull) ? p.debate.bull : [];
        const bearArr = Array.isArray(p.debate.bear) ? p.debate.bear : [];
        debateHTML = `<div class="pick-row">
          <div class="pick-row-label">⚔️ 찬반 토론 (AI 멀티 분석)</div>
          <div class="debate">
            <div class="debate-col bull"><div class="debate-label bull-label">✅ 매수 이유 (Bull)</div>${bullArr.map(b => `<div class="debate-point">${b || ""}</div>`).join("")}</div>
            <div class="debate-col bear"><div class="debate-label bear-label">❌ 매도 이유 (Bear)</div>${bearArr.map(b => `<div class="debate-point">${b || ""}</div>`).join("")}</div>
          </div></div>`;
      }
    } catch(e) { debateHTML = ""; }

    // 시나리오 안전 렌더링
    let scenarioHTML = "";
    try {
      if (p.scenario && typeof p.scenario === 'object') {
        const bull = p.scenario.bull || {};
        const base = p.scenario.base || {};
        const bear = p.scenario.bear || {};
        scenarioHTML = `<div class="pick-row">
          <div class="pick-row-label">📊 시나리오 목표가 (강세/기본/약세)</div>
          <div class="scenario-grid">
            <div class="scenario-box bull-sc"><div class="scenario-label">🟢 강세</div><div class="scenario-price">${typeof bull.price === 'number' ? bull.price.toLocaleString() : '-'}</div><div class="scenario-pct">${bull.pct || '-'}</div><div class="scenario-desc">${bull.desc || '-'}</div></div>
            <div class="scenario-box base-sc"><div class="scenario-label">⚪ 기본</div><div class="scenario-price">${typeof base.price === 'number' ? base.price.toLocaleString() : '-'}</div><div class="scenario-pct">${base.pct || '-'}</div><div class="scenario-desc">${base.desc || '-'}</div></div>
            <div class="scenario-box bear-sc"><div class="scenario-label">🔴 약세</div><div class="scenario-price">${typeof bear.price === 'number' ? bear.price.toLocaleString() : '-'}</div><div class="scenario-pct">${bear.pct || '-'}</div><div class="scenario-desc">${bear.desc || '-'}</div></div>
          </div></div>`;
      }
    } catch(e) { scenarioHTML = ""; }

    return `<div class="pick-card-wrap">${badge}<div class="${wrapClass}">
    ${crownHTML}
    <div class="pick-top">
      <div>
        <div class="pick-name">${p.name || "종목명 없음"}</div>
        <div class="pick-code">${p.code || ""}</div>
        <div class="pick-stars">${renderStars(p.stars || 0)}</div>
      </div>
      <div class="pick-price">
        <div class="pick-price-num">${price.toLocaleString()}</div>
        <div class="pick-price-chg ${chgClass}">${chgSign} ${Math.abs(change).toLocaleString()} (${changePct > 0 ? '+' : ''}${changePct}%)</div>
      </div>
    </div>
    ${alertBanner}

    <div class="pick-row">
      <div class="pick-row-label">📊 수급 상태</div>
      <div class="pick-row-value pick-row-strong">${p.supply || "수급 정보 없음"}</div>
    </div>

    <div class="pick-row">
      <div class="pick-row-label">🎯 수급 신호 (외인·기관·거래량)</div>
      ${renderSignals(p.signals)}
    </div>

    <div class="pick-row">
      <div class="pick-row-label">💰 매수 구간 + 비중 전략</div>
      <div class="pick-row-value"><span class="pick-row-green">${buyRange}</span></div>
      <div class="pick-row-value" style="font-size:12px;color:#8890aa;margin-top:3px">${p.buyExtra || ""}</div>
      <div class="pick-row-value" style="font-size:12px;color:#a78bfa;margin-top:3px">⚖️ ${p.weight || "비중 정보 없음"}</div>
    </div>

    <div class="pick-row">
      <div class="pick-row-label">📈 목표가 / 손절가 / 손익비</div>
      <div class="price-grid">
        <div class="price-box pb-buy">
          <div class="price-box-label">매집 중심</div>
          <div class="price-box-val">${buyCenter.toLocaleString()}</div>
          <div class="price-box-pct">기준가</div>
        </div>
        <div class="price-box pb-target">
          <div class="price-box-label">🎯 목표가</div>
          <div class="price-box-val">${target ? target.toLocaleString() : '-'}</div>
          <div class="price-box-pct">${p.targetPct || '-'}</div>
        </div>
        <div class="price-box pb-stop">
          <div class="price-box-label">🛑 손절가</div>
          <div class="price-box-val">${stop ? stop.toLocaleString() : '-'}</div>
          <div class="price-box-pct">${p.stopPct || '-'}</div>
        </div>
      </div>
      <div class="pick-row-value" style="text-align:center;margin-top:8px;font-size:12px">손익비 <span class="pick-row-yellow">${p.riskReward || '-'}</span></div>
    </div>

    <div class="pick-row">
      <div class="pick-row-label">📰 뉴스 헤드라인 (추천 근거)</div>
      ${newsHTML}
    </div>

    <div class="pick-row">
      <div class="pick-row-label">🏭 섹터 · 테마</div>
      <div class="tag-row">${sectorHTML}</div>
    </div>

    <div class="pick-row">
      <div class="pick-row-label">⏰ 유효 기간</div>
      <div class="tag-row"><span class="mini-tag time">${p.valid || "미정"}</span></div>
    </div>

    <div class="pick-row">
      <div class="pick-row-label">⚠️ 리스크 요인</div>
      ${risksHTML}
    </div>

    ${debateHTML}
    ${scenarioHTML}
  </div></div>`;
  } catch(e) {
    return `<div class="pick-card-wrap"><div class="pick-card"><div style="padding:20px;text-align:center;color:#fb7185">⚠️ 카드 렌더링 오류: ${e.message || "알 수 없는 오류"}<br><small>데이터가 예상과 다른 형식입니다</small></div></div></div>`;
  }
}

function renderTrackRecord(tr) {
  try {
    if (!tr || typeof tr !== 'object') return `<div class="track-section">
      <div class="track-header"><div class="track-title">📊 AI 적중률 분석</div></div>
      <div class="track-empty">장마감(15:30) 후 자동으로 분석됩니다<br>추천 종목 vs 종가 비교 · 적중률 · 개선점 분석</div>
    </div>`;

    const records = Array.isArray(tr.records) ? tr.records : [];
    const hitCount = records.filter(r => r && r.result === "hit").length;
    const totalCount = records.length;
    const hitRate = typeof tr.hitRate === 'number' ? tr.hitRate : 0;
    const rateClass = hitRate >= 70 ? "good" : hitRate >= 50 ? "warn" : "bad";
    const avgReturn = tr.avgReturn || "0%";

    return `<div class="track-section">
      <div class="track-header">
        <div class="track-title">📊 AI 적중률 분석</div>
        <div class="track-date">${tr.date || ""} 기준</div>
      </div>
      <div class="track-summary">
        <div class="track-stat"><div class="track-stat-val ${rateClass}">${hitRate}%</div><div class="track-stat-label">적중률</div></div>
        <div class="track-stat"><div class="track-stat-val" style="color:#60a5fa">${hitCount}/${totalCount}</div><div class="track-stat-label">적중/전체</div></div>
        <div class="track-stat"><div class="track-stat-val ${parseFloat(avgReturn) >= 0 ? 'good' : 'bad'}">${avgReturn}</div><div class="track-stat-label">평균 수익률</div></div>
        ${tr.totalDays ? `<div class="track-stat"><div class="track-stat-val" style="color:#a78bfa">${tr.totalDays}일</div><div class="track-stat-label">누적 분석</div></div>` : ""}
      </div>
      ${records.map(r => { try { return `<div class="track-row">
        <div class="track-name">${(r && r.name) || "?"}</div>
        <div class="track-prices">추천 ${r && typeof r.recPrice === 'number' ? r.recPrice.toLocaleString() : '-'} → 종가 ${r && typeof r.closePrice === 'number' ? r.closePrice.toLocaleString() : '-'} (${(r && r.dayReturn) || '-'})</div>
        <div class="track-result ${(r && r.result) || ''}">${r && r.result === "hit" ? "✅ 적중" : r && r.result === "miss" ? "❌ 미스" : "➖ 보합"}</div>
      </div>`; } catch(e) { return ""; } }).join("")}
      ${tr.insight ? `<div class="track-insight">💡 <strong>AI 인사이트:</strong> ${tr.insight}</div>` : ""}
      ${Array.isArray(tr.tomorrowWatch) && tr.tomorrowWatch.length ? `<div class="track-insight" style="margin-top:10px;border-left:3px solid #fbbf24">🔭 <strong>내일 관심종목:</strong><br>${tr.tomorrowWatch.map(w => `• ${w || ""}`).join("<br>")}</div>` : ""}
    </div>`;
  } catch(e) {
    return `<div class="track-section"><div style="padding:15px;text-align:center;color:#fb7185">적중률 데이터 로딩 오류</div></div>`;
  }
}

function renderIntradayPick(p) {
  try {
    if (!p) return "";
    const price = typeof p.price === 'number' ? p.price : 0;
    const change = typeof p.change === 'number' ? p.change : 0;
    const changePct = typeof p.changePct === 'number' ? p.changePct : 0;
    const chgClass = change >= 0 ? "chg-up" : "chg-down";
    const chgSign = change >= 0 ? "▲" : "▼";
    const isSwing = (p.style || "").includes("스윙");
    const buyRange = p.buyRange || (price ? price.toLocaleString() + "원" : "-");
    const target = typeof p.target === 'number' ? p.target.toLocaleString() : "-";
    const stop = typeof p.stop === 'number' ? p.stop.toLocaleString() : "-";
    const reason = p.reason || (Array.isArray(p.news) ? (p.news[0] || "") : "");
    const newsHTML = Array.isArray(p.news) && p.news.length ? p.news.map(n => `<div class="news-item">${n || ""}</div>`).join("") : "";
    const sectorHTML = Array.isArray(p.sector) ? p.sector.map(s => `<span class="mini-tag">#${s || ""}</span>`).join("") : "";

    return `<div class="intraday-card ${isSwing ? 'style-swing' : ''}">
      <div class="intraday-meta">
        <span class="intraday-time">⏰ ${p.time || "-"}</span>
        <span class="intraday-slot">${p.slot || "신규 발굴"}</span>
        <span class="intraday-style ${isSwing ? 'swing' : ''}">${p.style || "단타"}</span>
        <span style="font-size:11px;color:#fbbf24">${renderStars(p.stars || 0)}</span>
      </div>
      <div class="intraday-name-row">
        <div><span class="intraday-name">${p.name || "종목명 없음"}</span><span class="intraday-code">${p.code || ""}</span></div>
        <div class="intraday-price">${price.toLocaleString()}원 <span class="${chgClass}" style="font-size:12px;margin-left:4px">${chgSign}${Math.abs(change).toLocaleString()} (${changePct > 0 ? '+' : ''}${changePct}%)</span></div>
      </div>
      ${reason ? `<div class="intraday-reason">💡 ${reason}</div>` : ""}
      <div class="intraday-grid">
        <div class="intraday-kv"><div class="intraday-kv-label">💰 매수</div><div class="intraday-kv-val intraday-kv-buy">${buyRange}</div></div>
        <div class="intraday-kv"><div class="intraday-kv-label">🎯 목표</div><div class="intraday-kv-val intraday-kv-target">${target} <span style="font-size:10px;opacity:0.8">${p.targetPct || ''}</span></div></div>
        <div class="intraday-kv"><div class="intraday-kv-label">🛑 손절</div><div class="intraday-kv-val intraday-kv-stop">${stop} <span style="font-size:10px;opacity:0.8">${p.stopPct || ''}</span></div></div>
      </div>
      ${p.supply ? `<div style="font-size:12px;color:#b8bccc;margin-top:8px;line-height:1.5">📊 ${p.supply}</div>` : ""}
      ${newsHTML ? `<div style="margin-top:8px">${newsHTML}</div>` : ""}
      ${sectorHTML ? `<div class="tag-row" style="margin-top:6px">${sectorHTML}</div>` : ""}
      <div class="intraday-bottom">
        <span>⏰ ${p.valid || "당일 단타"}</span>
        <span class="intraday-rr">R:R ${p.riskReward || '-'}</span>
      </div>
    </div>`;
  } catch(e) {
    return `<div class="intraday-card"><div style="padding:12px;text-align:center;color:#fb7185">⚠️ 카드 오류</div></div>`;
  }
}

function renderIntradaySection(picks) {
  const arr = Array.isArray(picks) ? picks : [];
  const count = arr.length;
  const helpText = "장중 예약 작업(09:12·09:24·10:34·14:07)이 <strong>실시간 수급·거래량을 스캔해</strong> 아침 추천 이외의 <strong>완전히 새로운 대장주</strong>를 발굴해 이 자리에 쌓아갑니다. 아침 TOP3 가격 갱신이 아닙니다.";
  const body = count === 0
    ? `<div class="intraday-empty">🔎 장 시작 후 예약 스캔에서 신규 대장주가 포착되면 여기에 쌓입니다<br>09:12 시초가 · 09:24 수급 · 10:34 2부 주도주 · 14:07 오후 기관 매수</div>`
    : arr.map(renderIntradayPick).join("");
  return `<div class="intraday-section">
    <div class="intraday-header">
      <div class="intraday-title">🔥 장중 신규 발굴 주도주</div>
      <span class="intraday-count">${count}종목 누적</span>
    </div>
    <div class="intraday-help">${helpText}</div>
    ${body}
  </div>`;
}

// ===== RENDER =====
function renderItemSection(s, idxPrefix) {
  const items = s.items.map((it, i) => {
    const badgeClass = it.badgeType ? ("b-" + it.badgeType) : ("b-" + it.badge);
    return `<div class="item" data-check="${idxPrefix}-${i}">
      <span class="badge ${badgeClass}">${it.badge}</span>
      <div class="item-body">
        <div class="item-title">${it.title}</div>
        <div class="item-desc">${it.desc}</div>
      </div>
    </div>`;
  }).join("");
  const count = s.items.filter(x => x.badge === "필수").length;
  const countLabel = count > 0 ? `<span class="section-count">${count}개 필수</span>` : "";
  return `<div class="section ${s.open ? 'open' : ''}">
    <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="section-icon" style="background:${s.iconBg}">${s.icon}</div>
      <div class="section-title-wrap">
        ${s.time ? `<div class="section-time">${s.time}</div>` : ""}
        <div class="section-title">${s.title}</div>
      </div>
      ${countLabel}
      <span class="chevron">▼</span>
    </div>
    <div class="section-body">${items}</div>
  </div>`;
}

function renderBulletSection(s, idxPrefix) {
  const items = s.items.map((text, i) =>
    `<div class="bullet-item ${s.dot}" data-check="${idxPrefix}-${i}">
      <div class="bullet-text">${text}</div>
    </div>`
  ).join("");
  return `<div class="section ${s.open ? 'open' : ''}">
    <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="section-icon" style="background:${s.iconBg}">${s.icon}</div>
      <div class="section-title-wrap">
        <div class="section-title">${s.title}</div>
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="section-body">${items}</div>
  </div>`;
}

// ===== TABS =====
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("page-" + tab.dataset.page).classList.add("active");
    updateProgress();
    const isPick = tab.dataset.page === "pick";
    document.querySelector(".progress").style.display = isPick ? "none" : "flex";
    document.querySelector(".reset-btn").style.display = isPick ? "none" : "block";
  });
});
// hide progress on initial pick view
document.querySelector(".progress").style.display = "none";
document.querySelector(".reset-btn").style.display = "none";

// ===== CHECK (in-memory) =====
const checked = {};
document.body.addEventListener("click", (e) => {
  const el = e.target.closest("[data-check]");
  if (!el) return;
  const id = el.dataset.check;
  checked[id] = !checked[id];
  el.classList.toggle("checked", checked[id]);
  updateProgress();
});

function updateProgress() {
  const activePage = document.querySelector(".page.active");
  if (!activePage) return;
  const all = activePage.querySelectorAll("[data-check]");
  const done = activePage.querySelectorAll("[data-check].checked");
  const total = all.length;
  const d = done.length;
  const pct = total ? (d / total) * 100 : 0;
  document.getElementById("pfill").style.width = pct + "%";
  document.getElementById("ptext").textContent = d + " / " + total;
}

function resetChecks() {
  Object.keys(checked).forEach(k => delete checked[k]);
  document.querySelectorAll("[data-check]").forEach(el => el.classList.remove("checked"));
  updateProgress();
}

updateProgress();
